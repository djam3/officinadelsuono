name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Un solo deploy alla volta per branch: evita le gare tra più push ravvicinati
# (causa dell'errore "supplied version is the current active version").
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install --include=optional

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase (Hosting + Functions)
        if: github.ref == 'refs/heads/main'
        run: |
          set +e
          OUT=$(npx firebase-tools deploy --only hosting,functions --project officinadelsuono-87986 --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            # Caso benigno: l'hosting è già live con questa identica versione.
            if echo "$OUT" | grep -q "is the current active version"; then
              echo "::notice::Hosting già aggiornato (versione identica già live) — deploy considerato riuscito."
              exit 0
            fi
            exit $CODE
          fi
