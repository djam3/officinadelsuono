<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A1A1AA" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F27D26"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F27D26" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F27D26" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="50" cy="50" r="40" fill="url(#centerGlow)"/>

  <circle cx="50" cy="50" r="44" fill="none"
    stroke="url(#ringGradient)" stroke-width="3" stroke-linecap="round"
    stroke-dasharray="260 16" transform="rotate(-90 50 50)"/>

  <circle cx="50" cy="50" r="36" fill="none"
    stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="2 3"/>

  <g fill="url(#barGradient)">
    <rect x="32" y="36" width="5" height="28" rx="2.5"/>
    <rect x="41" y="41" width="5" height="18" rx="2.5"/>
    <rect x="50" y="32" width="5" height="36" rx="2.5"/>
    <rect x="59" y="43" width="5" height="14" rx="2.5"/>
    <rect x="68" y="38" width="5" height="24" rx="2.5"/>
  </g>

  <g stroke="#F27D26" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="6" x2="50" y2="11"/>
    <line x1="94" y1="50" x2="89" y2="50"/>
    <line x1="50" y1="94" x2="50" y2="89"/>
    <line x1="6" y1="50" x2="11" y2="50"/>
  </g>
</svg>
